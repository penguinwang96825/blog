<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="https://penguinwang96825.github.io" target="_self">
              <img class="svg" src="/images/cn.svg" width="20pt"> 中文</a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}" target="_self">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
      <span class="theme-toggle-shadow">
        <button class="theme-toggle switch" type="button" aria-label="Enable dark mode" aria-pressed="false" title="Toggle dark mode">
          <img class="switch__cloud switch__cloud--2" src="https://assets.codepen.io/58281/cloud-1.svg" alt="">
          <img class="switch__cloud switch__cloud--1" src="https://assets.codepen.io/58281/cloud-2.svg" alt="">
          <span class="switch__inner">
            <span class="switch-globe">
              <img class="switch-globe__moon" src="https://assets.codepen.io/58281/moon_1.png" alt="">
              <span class="switch-globe__circle"></span>
            </span>
            <img class="switch__stars" src="https://assets.codepen.io/58281/stars.svg" alt="">
          </span>
          <span class="theme-toggle__text">Dark</span>
        </button>
      </span>
    </div>
  </div>
</div>
